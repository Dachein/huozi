name: Edge Deploy

# Provision a huozi Edge demo deployment from a GitHub-hosted runner.
# Runs on Microsoft Azure infrastructure with direct internet (no
# VPN / DNS interception), so wrangler upload is fast and reliable —
# the chronic local-VPN issues that caused our laptop deploys to fail
# don't exist here.
#
# Setup (one-time):
#   1. Generate a CF API token at
#      https://dash.cloudflare.com/profile/api-tokens with scopes:
#        Account · Workers Scripts:Edit, D1:Edit, Workers R2 Storage:Edit
#        Zone (huozi.app) · DNS:Edit, Workers Routes:Edit
#   2. In repo Settings → Secrets and variables → Actions, add:
#        CLOUDFLARE_API_TOKEN  ← that token
#
# Trigger:
#   GitHub web UI → Actions → "Edge Deploy" → "Run workflow"
#   Optional inputs: hostname / workspace name (defaults shown)
#
# Output:
#   Step "Print setup URL" emits a one-shot https://<host>/admin/setup?
#   secret=... URL. Open in a browser to set the first admin email +
#   password. After that the URL self-disables (one-shot guard).

on:
  workflow_dispatch:
    inputs:
      hostname:
        description: "Edge hostname (e.g. edge.huozi.app)"
        required: true
        default: "edge.huozi.app"
      zone:
        description: "Cloudflare zone the hostname lives under"
        required: true
        default: "huozi.app"
      workspace_slug:
        description: "Workspace slug (used in /shares/<slug>/... etc.)"
        required: true
        default: "demo"
      workspace_name:
        description: "Workspace display name"
        required: true
        default: "Edge Demo"
      teardown_first:
        description: "Hard-wipe existing resources before deploy"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      EDGE_HOSTNAME: ${{ inputs.hostname }}
      EDGE_ZONE: ${{ inputs.zone }}
      EDGE_WORKSPACE_SLUG: ${{ inputs.workspace_slug }}
      EDGE_WORKSPACE_NAME: ${{ inputs.workspace_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install jq (CF API JSON parsing)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Install huozi-cloud deps
        working-directory: packages/huozi-cloud
        run: pnpm install --frozen-lockfile

      - name: Verify CF API token
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts)
          if [ "$status" != "200" ]; then
            echo "::error ::CF API token rejected (HTTP $status). Check repo secret CLOUDFLARE_API_TOKEN scopes."
            exit 1
          fi
          echo "✓ token valid"

      - name: Hard-wipe existing resources (optional)
        if: inputs.teardown_first
        run: bash scripts/edge-deploy-ci-teardown.sh

      - name: Provision Edge
        id: provision
        run: bash scripts/edge-deploy-ci.sh

      - name: Print setup URL
        run: |
          echo "::notice title=Edge ready::Open the setup URL in a browser:"
          echo ""
          echo "  ${{ steps.provision.outputs.setup_url }}"
          echo ""
          echo "After the first admin is created, this URL self-disables."
