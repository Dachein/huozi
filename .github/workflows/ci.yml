name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: typecheck + worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/huozi-cloud/package-lock.json

      # Two install steps because the worker is a nested package with
      # its own lockfile. `npm ci` is faster + reproducible.
      - name: install root deps
        run: npm ci

      - name: install worker deps
        working-directory: packages/huozi-cloud
        run: npm ci

      - name: typecheck (Next.js app)
        run: npx tsc --noEmit

      - name: typecheck + test (Worker)
        working-directory: packages/huozi-cloud
        run: |
          npm run build
          npm test
